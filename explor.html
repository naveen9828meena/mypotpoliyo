<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Naveen Meena">
    <meta name="description" content="About myself and learning projects">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML, CSS, Portfolio, Contact">
    <title>My Portfolio</title>

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #050816;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 50px 20px;
        }

        /* -----------------------------------------
           Navbar Styles
        ----------------------------------------- */
        nav {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            color: #00bfff;
            font-size: 28px; /* Slightly adjusted for better scaling */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu {
            display: flex;
            gap: 15px; /* Spacing adjusted for clean look */
        }

        .menu a {
            text-decoration: none;
            color: white;
            padding: 6px 15px;
            border-radius: 8px;
            background: #1f2937;
            transition: 0.3s;
            font-size: 16px; /* Balanced navbar text size */
            font-weight: bold;
            text-transform: capitalize;
        }

        .menu a:hover {
            background: #00bfff;
            color: black;
            box-shadow: 0 0 15px #00bfff;
        }

        /* -----------------------------------------
           Main Education Section Styles
        ----------------------------------------- */
        section {
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h2 {
            color: #ffffff;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Education Boxes Layout */
        .education-box {
            width: 85%;
            padding: 18px 22px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .education-box:hover {
            transform: scale(1.02);
        }

        /* Box Alignments */
        .left-box {
            align-self: flex-start;
        }

        .right-box {
            align-self: flex-end;
        }

        .center-box {
            align-self: center;
            width: 100%;
        }

        /* Box Color Customizations */
        .box-blue {
            background: rgba(0, 123, 255, 0.1);
            border-left: 5px solid #007bff;
        }
        .box-blue h1 { color: #007bff; }

        .box-green {
            background: rgba(40, 167, 69, 0.1);
            border-left: 5px solid #28a745;
        }
        .box-green h1 { color: #28a745; }

        .box-purple {
            background: rgba(145, 94, 255, 0.1);
            border-left: 5px solid #915eff;
        }
        .box-purple h3 { color: #915eff; }

        /* Typography Inside Boxes */
        h1, h3 {
            font-size: 1.15rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        p {
            color: #ccd6f6;
            font-size: 0.9rem;
            margin: 4px 0;
            line-height: 1.4;
        }

        p strong {
            color: rgba(255, 255, 255, 0.6);
            margin-right: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">portfolio</div>
        <div class="menu">
            <a href="about.html">about</a>
        </div>
    </nav>

    <section>
        <h2>Education</h2>

        <div class="education-box left-box box-blue">
            <h1><strong>10th pass</strong></h1>
            <p><strong>year</strong>2021</p>
            <p><strong>present</strong>85%</p>
        </div>

        <div class="education-box right-box box-green">
            <h1><strong>12th pass</strong></h1>
            <p><strong>year</strong>2023</p>
            <p><strong>present</strong>71</p>
        </div>
        
        <div class="education-box center-box box-purple">
            <h3>Bachelor of Technology in Computer Science and Engineering</h3>
            <p>3rd year student</p>
            <p>2024-2028</p>
            <p>Rajasthan Technical University, Kota</p>
        </div>
    </section>

</body>
</html>
